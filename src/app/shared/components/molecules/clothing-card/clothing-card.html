<div class="clothing-card w-48 h-58">
    <div class="flex relative bg-gray-200 h-40 rounded-lg overflow-hidden p-2 items-center">
        <app-favorite-button class="absolute top-2 right-3" [size]="'xxs'"></app-favorite-button>
        <img [src]="imageUrl" alt="{{ name }}" class="z-0 clothing-image object-cover" />
        <app-badge class="absolute bottom-2 left-2" [text]="category"></app-badge>
    </div>
    <div class="px-2">
        <h3 class="clothing-name my-1">{{ name }}</h3>
        <app-color-dot [colors]="colors" class="flex my-1"></app-color-dot>
    </div>
</div>
