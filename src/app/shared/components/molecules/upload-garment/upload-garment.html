@switch (state) {
    @case ('idle') {
        <div class="flex flex-col items-center gap-4">
        <p class="text-gray-500">Añadir nueva prenda</p>
        
        </div>
    }
    @case ('loading') {
        <p>Loading...</p>
    }
    @case ('result') {
        <p>Garment uploaded successfully!</p>
    }
    @case ('added') {
        <p>Garment added to your closet!</p>
    }
}
