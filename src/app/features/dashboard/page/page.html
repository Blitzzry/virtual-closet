<div class="flex w-full h-full items-center justify-center gap-5">
    <div class="flex flex-col gap-2">
        @for (item of items; track $index) {
        <app-categories-filter [iconCategoryName]="item.category" [categoryCounter]="2"></app-categories-filter>
        }
        <div class="flex gap-2 mt-4">
        @for (item of items; track $index) {
        <app-color-dot [colors]="item.colors[0]" [colorSize]="'24px'" class="flexmy-1"></app-color-dot>
        }
        </div>
    </div>
    <app-clothing-card></app-clothing-card>
</div>
